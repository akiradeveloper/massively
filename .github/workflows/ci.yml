name: CI

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y mesa-vulkan-drivers vulkan-tools ripgrep

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Install cargo-nextest
        uses: taiki-e/install-action@v2
        with:
          tool: nextest@0.9

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Build tests, examples, and benches
        run: cargo check --tests --examples --benches

      - name: Run tests
        run: cargo nextest run

      - name: Run doctests
        run: cargo test --doc

      - name: Build documentation
        run: cargo doc -p massively --no-deps

      - name: Check public API
        run: bash scripts/check-public-api.sh

      - name: Verify package
        run: cargo package --no-verify
